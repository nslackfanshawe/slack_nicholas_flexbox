<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Nut</title>

<link href="css/grid.css" rel="stylesheet">
<link href="css/main.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="main-header">
        <div class="grid-con header-grid">
            <div class="logo col-span-1 m-col-span-2 l-col-span-2">
            <div class="logo col-span-1 m-col-span-2 l-col-span-2">
                <img
                    sizes="(max-width: 500px) 100vw, 500px"
                    srcset="
                    images/logo/logo_320.png 320w,
                    images/logo/logo_500.png 500w"
                    src="images/logo/logo_500.png"
                    alt="Dr. Nut logo">
            </div>
            </div>
            <nav class="main-nav col-span-3 m-col-span-10 l-col-span-10">
                <ul class="nav-list">
                <li><a href="#">Products</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Locations</a></li>
                <li><a href="#">Photos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="grid-con hero-grid">
                <div class="hero-image col-span-full m-col-span-full l-col-span-full">
                 <img
                    sizes="(max-width: 935px) 100vw, 935px"
                    srcset="
                    images/glass/pop_glass_320.png 320w,
                    images/glass/pop_glass_442.png 442w,
                    images/glass/pop_glass_544.png 544w,
                    images/glass/pop_glass_633.png 633w,
                    images/glass/pop_glass_723.png 723w,
                    images/glass/pop_glass_812.png 812w,
                    images/glass/pop_glass_891.png 891w,
                    images/glass/pop_glass_935.png 935w"
                    src="images/glass/pop_glass_935.png"
                    alt="A fizzy glass of Dr. Nut">
                </div>

            <div class="hero-content col-span-full m-col-span-full l-col-span-full">
            <div class="hero-content-inner">
                <h2>Dr. Nut is Back!</h2>
                <p>
                The drink you all knew and loved from the 1930s is back in stores,
                in a brand new way for you to enjoy it.
                </p>
            </div>
            </div>
            </div>
        </section>
        <script src="js/main.js"></script>
    </main>
</body>
</html>
